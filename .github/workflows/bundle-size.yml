name: Bundle Size

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size:
    name: Check bundle size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Report bundle sizes
        id: size-report
        run: |
          echo "### Bundle Size Report" > size-report.md
          echo "" >> size-report.md
          echo "| File | Size (gzip) |" >> size-report.md
          echo "|------|-------------|" >> size-report.md
          
          for file in dist/**/*.js; do
            if [ -f "$file" ]; then
              raw=$(stat -c%s "$file")
              gzip=$(gzip -c "$file" | wc -c)
              name=$(echo "$file" | sed 's|dist/||')
              echo "| $name | $(numfmt --to=iec-i --suffix=B $gzip) |" >> size-report.md
            fi
          done
          
          echo "" >> size-report.md
          echo "**Total dist size (raw):** $(du -sh dist/ | cut -f1)" >> size-report.md
          
          cat size-report.md
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          cat size-report.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post size report on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          EXISTING=$(gh api repos/${{ github.repository }}/issues/$PR_NUMBER/comments \
            --jq '.[] | select(.user.type == "Bot" and (.body | contains("Bundle Size Report"))) | .id' \
            | head -1)
          
          if [ -n "$EXISTING" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$EXISTING \
              -X PATCH -f body="$(cat size-report.md)"
          else
            gh pr comment $PR_NUMBER --body "$(cat size-report.md)"
          fi
